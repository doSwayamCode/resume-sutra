<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="ResumeSutra Favicon">
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB800" />
      <stop offset="50%" stop-color="#FF6B00" />
      <stop offset="100%" stop-color="#FF4D4D" />
    </linearGradient>
  </defs>

  <!-- Rounded white background for visibility -->
  <rect width="64" height="64" rx="14" fill="#ffffff"/>

  <!-- Logo Icon Simplified for 64x64 -->
  <g transform="translate(6, 6)">
    <!-- Head -->
    <path d="M26 30 A20 20 0 1 1 26.1 30" fill="none" stroke="url(#brandGradient)" stroke-width="6" stroke-linecap="round" />
    <!-- Eyes -->
    <circle cx="18" cy="18" r="3" fill="url(#brandGradient)" />
    <circle cx="34" cy="18" r="3" fill="url(#brandGradient)" />
    <!-- Smile -->
    <path d="M17 26 Q26 32 35 26" fill="none" stroke="url(#brandGradient)" stroke-width="3" stroke-linecap="round" />
    <!-- S Curve -->
    <path d="M16 28 C6 36 10 44 26 44 C42 44 46 52 36 58" fill="none" stroke="url(#brandGradient)" stroke-width="7" stroke-linecap="round" />
  </g>
</svg>
