<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="IISc academic resume preview">
  <defs>
    <linearGradient id="iisc-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f7fa"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#iisc-bg)"/>
  <rect x="120" y="70" width="960" height="580" rx="14" fill="#ffffff" stroke="#cbd5e1"/>

  <text x="190" y="130" font-family="Times New Roman, serif" font-size="34" font-weight="700" fill="#111827">IISc Academic Resume</text>
  <text x="1010" y="124" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">email@domain.com</text>
  <text x="1010" y="144" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#1f2937">+91-9000000000</text>
  <line x1="190" y1="160" x2="1010" y2="160" stroke="#111827" stroke-width="2"/>

  <g font-family="Times New Roman, serif" fill="#111827">
    <text x="190" y="220" font-size="17" font-weight="700">SUMMARY</text>
    <line x1="190" y1="226" x2="1010" y2="226" stroke="#334155"/>
    <rect x="190" y="240" width="820" height="8" fill="#e5e7eb"/>

    <text x="190" y="282" font-size="17" font-weight="700">EDUCATION</text>
    <line x1="190" y1="288" x2="1010" y2="288" stroke="#334155"/>
    <rect x="190" y="302" width="780" height="8" fill="#e5e7eb"/>

    <text x="190" y="344" font-size="17" font-weight="700">RESEARCH / PROJECTS</text>
    <line x1="190" y1="350" x2="1010" y2="350" stroke="#334155"/>
    <rect x="190" y="364" width="800" height="8" fill="#e5e7eb"/>
    <rect x="190" y="378" width="740" height="8" fill="#e5e7eb"/>

    <text x="190" y="420" font-size="17" font-weight="700">EXPERIENCE</text>
    <line x1="190" y1="426" x2="1010" y2="426" stroke="#334155"/>
    <rect x="190" y="440" width="750" height="8" fill="#e5e7eb"/>

    <text x="190" y="482" font-size="17" font-weight="700">SKILLS</text>
    <line x1="190" y1="488" x2="1010" y2="488" stroke="#334155"/>
    <rect x="190" y="502" width="640" height="8" fill="#e5e7eb"/>

    <text x="190" y="544" font-size="17" font-weight="700">PUBLICATIONS / AWARDS</text>
    <line x1="190" y1="550" x2="1010" y2="550" stroke="#334155"/>
    <rect x="190" y="564" width="700" height="8" fill="#e5e7eb"/>
  </g>
