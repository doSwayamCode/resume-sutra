<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="IIIT placement resume preview">
  <defs>
    <linearGradient id="iiit-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eaf3ff"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#iiit-bg)"/>
  <rect x="120" y="70" width="960" height="580" rx="18" fill="#ffffff" stroke="#d5e2f0"/>

  <text x="600" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#0f172a">IIIT PLACEMENT RESUME</text>
  <line x1="190" y1="152" x2="1010" y2="152" stroke="#0f172a" stroke-width="2"/>
  <text x="600" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">name@email.com • +91-9000000000 • github.com/username</text>

  <g font-family="Arial, sans-serif" fill="#0f172a">
    <text x="190" y="230" font-size="17" font-weight="700">EDUCATION</text>
    <line x1="190" y1="238" x2="1010" y2="238" stroke="#64748b"/>
    <rect x="190" y="252" width="820" height="10" fill="#dbeafe"/>

    <text x="190" y="290" font-size="17" font-weight="700">PROJECTS</text>
    <line x1="190" y1="298" x2="1010" y2="298" stroke="#64748b"/>
    <rect x="190" y="312" width="820" height="8" fill="#e2e8f0"/>
    <rect x="190" y="326" width="760" height="8" fill="#e2e8f0"/>

    <text x="190" y="365" font-size="17" font-weight="700">EXPERIENCE</text>
    <line x1="190" y1="373" x2="1010" y2="373" stroke="#64748b"/>
    <rect x="190" y="387" width="820" height="8" fill="#e2e8f0"/>
    <rect x="190" y="401" width="740" height="8" fill="#e2e8f0"/>

    <text x="190" y="440" font-size="17" font-weight="700">SKILLS</text>
    <line x1="190" y1="448" x2="1010" y2="448" stroke="#64748b"/>
    <rect x="190" y="462" width="640" height="8" fill="#e2e8f0"/>

    <text x="190" y="500" font-size="17" font-weight="700">ACHIEVEMENTS</text>
    <line x1="190" y1="508" x2="1010" y2="508" stroke="#64748b"/>
    <rect x="190" y="522" width="680" height="8" fill="#e2e8f0"/>
  </g>
</svg>
